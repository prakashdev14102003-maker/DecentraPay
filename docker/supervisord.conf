[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

; ── PostgreSQL ────────────────────────────────────────────────
[program:postgres]
command=/usr/lib/postgresql/15/bin/postgres -D /var/lib/postgresql/data -c listen_addresses='127.0.0.1' -c port=5432
user=postgres
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

; ── Hardhat Local Node ────────────────────────────────────────
[program:hardhat]
command=/root/.bun/bin/bunx hardhat node --hostname 127.0.0.1
directory=/app/packages/contracts
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20

; ── API Server ────────────────────────────────────────────────
[program:api]
command=/root/.bun/bin/bun run src/index.ts
directory=/app/apps/api
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30
environment=DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:5432/decentrapay",PORT="3001",RPC_URL="http://127.0.0.1:8545",NODE_ENV="production"

; ── Next.js Web ───────────────────────────────────────────────
[program:web]
command=/usr/bin/node apps/web/.next/standalone/apps/web/server.js
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=40
environment=PORT="%(ENV_PORT)s",HOSTNAME="0.0.0.0",NODE_ENV="production"
